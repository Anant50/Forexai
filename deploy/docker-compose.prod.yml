version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: forexai_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-forexai_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_db_pass_123}
      POSTGRES_DB: ${POSTGRES_DB:-forexai_prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-forexai_admin} -d ${POSTGRES_DB:-forexai_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - forexai_net

  redis:
    image: redis:7-alpine
    container_name: forexai_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-secure_redis_pass_123} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-secure_redis_pass_123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - forexai_net

  backend:
    build:
      context: ../backend
      dockerfile: ../deploy/Dockerfile.backend
    container_name: forexai_backend
    restart: always
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-forexai_admin}:${POSTGRES_PASSWORD:-secure_db_pass_123}@db:5432/${POSTGRES_DB:-forexai_prod}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-secure_redis_pass_123}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=HS256
      - CHROMA_DIR=/app/data/chroma
      - KNOWLEDGE_UPLOAD_DIR=/app/data/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_data:/app/data
    networks:
      - forexai_net

  frontend:
    build:
      context: ../frontend
      dockerfile: ../deploy/Dockerfile.frontend
    container_name: forexai_frontend
    restart: always
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    networks:
      - forexai_net

  nginx:
    image: nginx:alpine
    container_name: forexai_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - forexai_net

volumes:
  postgres_data:
  redis_data:
  backend_data:
  certbot_www:
  certbot_certs:

networks:
  forexai_net:
    driver: bridge
